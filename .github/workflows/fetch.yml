name: Fetch Nifty Defence

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - run: pip install requests

      - name: Fetch data
        id: fetch
        continue-on-error: true
        run: |
          python <<'EOF'
          import requests, json, csv, sys, time
          from datetime import datetime, timedelta, timezone

          IST = timezone(timedelta(hours=5, minutes=30))
          start_time = time.time()
          triggered_at = datetime.now(IST).strftime("%Y-%m-%d %H:%M:%S")

          status = "Success"
          message = ""

          try:
              session = requests.Session()
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36",
                  "Accept": "*/*",
                  "Accept-Language": "en-US,en;q=0.9",
              }
              session.get("https://www.nseindia.com", headers=headers, timeout=10)
              resp = session.get(
                  "https://www.nseindia.com/api/allIndices",
                  headers={**headers, "Referer": "https://www.nseindia.com/market-data/live-equity-market"},
                  timeout=10,
              )
              resp.raise_for_status()
              payload = resp.json()
              data = payload["data"]

              if not data:
                  raise ValueError("Empty data returned from NSE")

              captured_at = datetime.now(IST).strftime("%Y-%m-%d %H:%M:%S")
              for row in data:
                  row["captured_at"] = captured_at

              with open("all_indices.json", "w") as f:
                  json.dump(payload, f, indent=2)

              fieldnames = sorted({key for row in data for key in row.keys()})
              with open("all_indices.csv", "w", newline="") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  writer.writerows(data)

          except Exception as e:
              status = "Failed"
              message = str(e)
              print(f"Fetch failed: {e}")

          duration = round(time.time() - start_time, 2)

          log_file = "run_log.csv"
          try:
              with open(log_file, "r"):
                  file_exists = True
          except FileNotFoundError:
              file_exists = False

          with open(log_file, "a", newline="") as f:
              writer = csv.writer(f)
              if not file_exists:
                  writer.writerow(["triggered_at", "status", "duration_seconds", "message"])
              writer.writerow([triggered_at, status, duration, message])

          print(f"Status: {status}, Duration: {duration}s")

          if status == "Failed":
              sys.exit(1)
          EOF

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add all_indices.json all_indices.csv run_log.csv
          git commit -m "Update data and run log" || echo "No changes"
          git push
